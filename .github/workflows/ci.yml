# Continuous Integration workflow for FlowFi
# Covers frontend linting/build, backend build/test, and Soroban contract build/test.
name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  frontend:
    name: Frontend CI
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci


      - name: Lint
        run: npm run lint
        working-directory: frontend

      - name: Install Rollup Native Binding
        run: npm install @rollup/rollup-linux-x64-gnu --no-save
        working-directory: frontend

      - name: Run Frontend Tests
        run: npm test
        working-directory: frontend

      - name: Build
        run: npm run build
        working-directory: frontend

  backend:
    name: Backend CI
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: flowfi_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --include=optional

      - name: Setup Database
        run: |
          npx prisma generate --schema=prisma/schema.prisma
          npx prisma db push --accept-data-loss --schema=prisma/schema.prisma
        working-directory: backend
        env:
          DATABASE_URL: postgresql://postgres:password@127.0.0.1:5432/flowfi_test

      - name: Build
        run: npm run build
        working-directory: backend

      - name: Install Rollup Native Binding
        run: npm install @rollup/rollup-linux-x64-gnu --no-save

      - name: Run Backend Tests
        run: |
          ls -la src/generated/prisma
          npm install @vitest/coverage-v8@2.1.9 --no-save
          npx vitest run --coverage --reporter=basic
        working-directory: backend
        env:
          DATABASE_URL: postgresql://postgres:password@127.0.0.1:5432/flowfi_test
          NODE_ENV: test

      - name: Upload backend coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: backend/coverage/lcov.info
          flags: backend
          name: backend-coverage
          fail_ci_if_error: true
          verbose: true
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  contracts:
    name: Soroban Contracts CI
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: wasm32-unknown-unknown

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "contracts -> target"

      - name: Build Contracts
        run: cargo build --target wasm32-unknown-unknown --release
        working-directory: contracts

      - name: Run Contract Tests
        run: cargo test
        working-directory: contracts

      - name: Install cargo-tarpaulin
        run: cargo install cargo-tarpaulin --locked

      - name: Run Contract Coverage
        run: cargo tarpaulin --workspace --out Xml --output-dir coverage --fail-under 70
        working-directory: contracts

      - name: Upload contract coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: contracts/coverage/cobertura.xml
          flags: contracts
          name: contracts-coverage
          fail_ci_if_error: true
          verbose: true
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

      - name: Install Stellar CLI
        run: |
          curl -fsSL https://github.com/stellar/stellar-cli/raw/main/install.sh | sh -s -- --install-deps
        shell: bash

      - name: Optimize WASM files
        run: |
          set -euo pipefail
          WASMS=$(find contracts/target -type f -name "*.wasm" -print)
          if [ -z "$WASMS" ]; then
            echo "No wasm files found"
            exit 1
          fi
          for w in $WASMS; do
            out="${w%%.wasm}.optimized.wasm"
            echo "Optimizing $w -> $out"
            stellar contract optimize --wasm "$w" --wasm-out "$out"
          done
        shell: bash

      - name: Upload optimized WASM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: optimized-wasm
          path: |
            contracts/target/**/**/*.optimized.wasm
